<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css"
    />
    <!--=============== REMIXICONS ===============-->
    <link rel="stylesheet" href="assets/css/styles.css" />
    <!--=============== CSS ===============-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./public/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./public/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./public/favicon-16x16.png"
    />
    <link rel="manifest" href="./public/site.webmanifest" />
    <title>Volta Express Brasil | Quero Carregar</title>
  </head>
  <body>
    <svg
      class="login__blob"
      viewBox="0 0 566 840"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!--=============== LOGIN IMAGE ===============-->
      <mask id="mask0" mask-type="alpha">
        <path
          d="M342.407 73.6315C388.53 56.4007 394.378 17.3643 391.538 
          0H566V840H0C14.5385 834.991 100.266 804.436 77.2046 707.263C49.6393 
          591.11 115.306 518.927 176.468 488.873C363.385 397.026 156.98 302.824 
          167.945 179.32C173.46 117.209 284.755 95.1699 342.407 73.6315Z"
        />
      </mask>
      <g mask="url(#mask0)">
        <path
          d="M342.407 73.6315C388.53 56.4007 394.378 17.3643 391.538 
          0H566V840H0C14.5385 834.991 100.266 804.436 77.2046 707.263C49.6393 
          591.11 115.306 518.927 176.468 488.873C363.385 397.026 156.98 302.824 
          167.945 179.32C173.46 117.209 284.755 95.1699 342.407 73.6315Z"
        />
        <image class="login__img" href="assets/img/estrada.jpg" />
        <!-- Insert your image (recommended size: 1000 x 1200) -->
      </g>
    </svg>
    <div class="login container grid" id="loginAccessRegister">
      <!--=============== LOGIN ===============-->
      <div class="login__access">
        <!--===== LOGIN ACCESS =====-->
        <div class="header-content-container">
          <img
            src="./assets/embarcador/caminhao.png"
            alt="Descrição da imagem"
            class="header-image"
          />
          <div class="header-text">
            <div class="header-title">
              <h1 class="login__title">Entrar no <br />Volta Express Brasil</h1>
              <p class="paragrafo-title">
                Sua próxima viagem espera por você. É só entrar e transportar!
              </p>
            </div>
          </div>
        </div>

        <div class="login__area">
          <form action="" class="login__form">
            <div class="login__content grid">
              <div class="login__box">
                <input
                  type="email"
                  id="email"
                  name="email"
                  required
                  placeholder=" "
                  class="login__input"
                />
                <label for="email" class="login__label">E-mail</label>
                <i class="ri-mail-fill login__icon"></i>
              </div>
              <div class="login__box">
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  placeholder=" "
                  class="login__input"
                />
                <label for="password" class="login__label">Password</label>
                <i
                  class="ri-eye-off-fill login__icon login__password"
                  id="loginPassword"
                ></i>
              </div>
            </div>
            <a href="#" class="login__forgot">Esqueceu sua senha?</a>
            <button type="submit" class="login__button">Entrar</button>
            <span id="login-message" class="login__feedback-message"></span>
          </form>
          <p class="login__switch">
            Não tem conta?
            <button id="loginButtonRegister">Criar conta</button>
          </p>
        </div>
      </div>

      <!--===== LOGIN REGISTER =====-->
      <div class="login__register">
        <div class="header-content-container">
          <img
            src="./assets/embarcador/caminhao.png"
            alt="Descrição da imagem"
            class="header-image"
          />
          <div class="header-text">
            <div class="header-title">
              <h1 class="login__title">
                Cadastrar no <br />Volta Express Brasil
              </h1>
              <p class="paragrafo-title">
                Sua próxima viagem espera por você. É só entrar e transportar!
              </p>
            </div>
          </div>
        </div>
        <div class="login__area">
          <form action="" class="login__form">
            <div class="login__content grid">
              <div class="login__group grid">
                <div class="login__box">
                  <input
                    type="text"
                    id="names"
                    name="nome"
                    required
                    placeholder=" "
                    class="login__input"
                  />
                  <label for="names" class="login__label">Nome</label>
                  <i class="ri-id-card-fill login__icon"></i>
                </div>
                <div class="login__box">
                  <input
                    type="text"
                    id="surnames"
                    name="sobrenome"
                    required
                    placeholder=" "
                    class="login__input"
                  />
                  <label for="surnames" class="login__label">Sobrenome</label>
                  <i class="ri-id-card-fill login__icon"></i>
                </div>
              </div>
              <div class="login__box">
                <input
                  type="email"
                  id="emailCreate"
                  name="email"
                  required
                  placeholder=" "
                  class="login__input"
                />
                <label for="emailCreate" class="login__label">E-mail</label>
                <i class="ri-mail-fill login__icon"></i>
              </div>
              <div class="login__box">
                <input
                  type="password"
                  id="passwordCreate"
                  name="password"
                  required
                  placeholder=" "
                  class="login__input"
                />
                <label for="passwordCreate" class="login__label"
                  >Password</label
                >
                <i
                  class="ri-eye-off-fill login__icon login__password"
                  id="loginPasswordCreate"
                ></i>
              </div>
            </div>
            <button type="submit" class="login__button">Cadastrar</button>
            <span id="register-message" class="login__feedback-message"></span>
          </form>
          <p class="login__switch">
            Já sou cadastrado?
            <button id="loginButtonAccess">Entrar</button>
          </p>
        </div>
      </div>
    </div>

    <div class="go-to-main-button">
      <a href="./../../quero-transportar/index.html">
        Ir para Quero Transportar
        <img
          src="./assets/img/logo-volta-express-caminhao.png"
          alt="Volta Express Brasil Logo"
        />
      </a>
    </div>
    <!--=============== MAIN JS ===============-->
    <script src="assets/js/main.js"></script>
  </body>
</html>
